name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd mtg-utils && uv sync
      # Lint + format ALL python in the repo (src + every skill's tests), not just
      # mtg-utils tests. Run from mtg-utils so the shared ruff config + the
      # `../tests/*` per-file-ignores in its pyproject.toml resolve.
      - run: cd mtg-utils && uv run ruff check src/ ../tests/
      - run: cd mtg-utils && uv run ruff format --check src/ ../tests/
      # ty is intentionally unpinned (uvx fetches latest): deck-forge ships a
      # Python backend API now, and new ty releases add checks worth catching.
      - run: cd mtg-utils && uvx ty check src/
      - run: cd mtg-utils && uv run pytest ../tests/mtg-utils/ -v
      - run: cd deck-wizard && uv sync && uv run pytest ../tests/deck-wizard/ -v
      - run: cd cube-wizard && uv sync && uv run pytest ../tests/cube-wizard/ -v
      - run: cd rules-lawyer && uv sync && uv run pytest ../tests/rules-lawyer/ -v
      - run: cd deck-strat && uv sync && uv run pytest ../tests/deck-strat/ -v
      - run: cd lgs-search && uv sync && uv run pytest ../tests/lgs-search/ -v
      - run: cd deck-forge && uv sync && uv run pytest ../tests/deck-forge/ -v

  # deck-forge commits its built SPA (D11: end-users run with no Node toolchain).
  # This guard fails if the committed dist/ is stale relative to the frontend source
  # — rebuild it deterministically and assert nothing changed.
  deck-forge-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd deck-forge/frontend && npm ci
      - run: cd deck-forge/frontend && npm run format:check
      - run: cd deck-forge/frontend && npm run lint
      - run: cd deck-forge/frontend && npm run check
      - run: cd deck-forge/frontend && npm run build
      - name: Assert committed dist/ matches a fresh build
        run: |
          if [ -n "$(git status --porcelain deck-forge/frontend/dist)" ]; then
            echo "::error::deck-forge/frontend/dist is stale. Run 'cd deck-forge/frontend && npm run build' and commit dist/."
            git status --porcelain deck-forge/frontend/dist
            git --no-pager diff -- deck-forge/frontend/dist | head -80
            exit 1
          fi
          echo "deck-forge/frontend/dist is up to date with src."
