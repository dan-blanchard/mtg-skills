name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd commander-tuner && uv sync
      - run: cd commander-tuner && uv run ruff check src/ ../tests/commander-tuner/
      - run: cd commander-tuner && uv run ruff format --check src/ ../tests/commander-tuner/
      - run: cd commander-tuner && uv run pytest ../tests/commander-tuner/ -v
