name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd mtg-utils && uv sync
      - run: cd mtg-utils && uv run ruff check src/ ../tests/mtg-utils/
      - run: cd mtg-utils && uv run ruff format --check src/ ../tests/mtg-utils/
      - run: cd mtg-utils && uv run pytest ../tests/mtg-utils/ -v
      - run: cd deck-builder && uv sync && uv run pytest ../tests/deck-builder/ -v
      - run: cd deck-tuner && uv sync && uv run pytest ../tests/deck-tuner/ -v
