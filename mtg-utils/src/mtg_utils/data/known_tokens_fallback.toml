id = "1498b1ca-31fb-50bd-b106-b9298eaece80"
rules_text = """
Enchant creature
Enchanted creature has "Whenever this creature attacks, if its toughness is 3 or less, put a +1/+1 counter on it.""""

[token.body]
display_name = "Young Hero"
