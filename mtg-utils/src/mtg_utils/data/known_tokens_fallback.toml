# Committed offline/CI fallback for phase's known-tokens.toml (task #92,
# widened task #95, again task #np_roles).
#
# mtg_utils._deck_forge._ir_lookup._known_tokens_index() prefers the LIVE
# tag-pinned known-tokens.toml (_phase.ensure_known_tokens() — a ~600-entry,
# ~6MB fetch, cached under ~/.cache/mtg-skills/phase/known-tokens/) when it
# can be fetched/read. This file is the deterministic fallback for when it
# can't (no network, cold cache, CI) — carrying ONLY the token identities
# the adjudicated allowlist (_KNOWN_TOKEN_WIRED_DISPLAY_NAMES: Mutagen,
# Young Hero, Powerstone, Lander, Gold, Map, Junk, Wicked, and the
# task #np_roles seven — Cursed, Royal, Sorcerer, Shard, Wizard, Contract,
# Spellgorger Weird) actually wires, trimmed to the fields the join reads
# (id / rules_text / token.body) and dropping the upstream entry's large
# source_card_names / source_card_refs / token_image_ref arrays
# (informational there, unread here). Same-text twin ids (Cursed / Royal /
# Shard each exist twice upstream) are BOTH carried so the id-keyed join
# stays whole offline; the toml's OTHER "Wizard" identities (a mana
# wizard, a ping wizard) are deliberately absent — no gap-gated creator
# references them today, and each needs its own adjudication before
# joining.
#
# Extracted verbatim from phase v0.23.0's known-tokens.toml. If the wired
# allowlist ever widens, add the new identity's trimmed entry here too, so
# CI / offline dev stays deterministic regardless of who has a live fetch.

